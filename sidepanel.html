<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对话列表</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo-section">
        <div class="logo">01</div>
        <div class="title-group">
          <h1>零壹</h1>
          <span class="subtitle">对话总结助手</span>
        </div>
      </div>
      <div class="header-actions">
        <button id="refreshBtn" class="icon-btn" title="刷新列表">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="search-bar">
      <div class="search-box">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="搜索对话..." />
      </div>
      <div class="mode-wrapper">
        <div class="custom-select" id="customModeSelect">
          <div class="custom-select-label" id="modeSelectLabel">deepseek</div>
          <svg class="custom-select-arrow" width="14" height="10" viewBox="0 0 14 10" fill="none">
            <path d="M1 1l6 8 6-8H1z" fill="#666"/>
          </svg>
          <div class="custom-select-options" id="modeSelectOptions">
            <div class="custom-option selected" data-value="data-virtual-list-item-key">deepseek</div>
            <div class="custom-option" data-value="data-turn">GPT</div>
          </div>
        </div>
      </div>
    </div>

    <div class="stats">
      <span id="questionCount">共 0 条记录</span>
    </div>

    <div id="questionList" class="question-list">
      <div class="loading">
        <div class="spinner"></div>
        <p>正在扫描页面...</p>
      </div>
    </div>

    <div id="emptyState" class="empty-state" style="display: none;">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/>
        <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
        <line x1="9" y1="9" x2="9.01" y2="9"/>
        <line x1="15" y1="9" x2="15.01" y2="9"/>
      </svg>
      <p>无满足指定对话</p>
      <p class="hint">尝试刷新页面或切换到其他模式</p>
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
